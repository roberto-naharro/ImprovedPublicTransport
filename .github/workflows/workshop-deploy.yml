name: Deploy to Steam Workshop

# Triggers on v* tag (from Release Please) or manually.
# Builds the mod from source in CI (game reference DLLs are in GameReferences/).
# No pre-built dist/ commit needed — CI handles the full build + deploy.
#
# Required secrets (environment: PRO):
#   STEAM_CONFIG_VDF   — base64-encoded ~/.steam/steamcmd/config/config.vdf
#   STEAM_USERNAME     — Steam username
#   WORKSHOP_ITEM_ID   — Workshop item ID (set after first publish via publish.sh)
#   RELEASE_PLEASE_TOKEN — PAT with repo scope (so tag push triggers this workflow)

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      changeNote:
        description: 'Override change note (leave blank to extract from CHANGELOG.md)'
        required: false
        default: ''

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: PRO
    permissions:
      contents: write   # upload the packaged mod as a GitHub Release asset

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Mono
        run: |
          sudo apt-get update
          sudo apt-get install -y mono-complete mono-xbuild

      - name: Setup NuGet
        uses: nuget/setup-nuget@v2

      - name: Restore NuGet packages
        run: nuget restore packages.config -PackagesDirectory packages

      - name: Inject version into AssemblyInfo.cs
        run: |
          TAG="${{ github.ref_name }}"
          VERSION="${TAG#v}"
          if [[ -z "$VERSION" || "$VERSION" == "$TAG" ]]; then
            VERSION=$(python3 -c "import json; print(json.load(open('.release-please-manifest.json'))['.'])")
          fi
          echo "Building version: $VERSION"
          sed -i "s/\[assembly: AssemblyVersion(\"[^\"]*\")\]/[assembly: AssemblyVersion(\"$VERSION.0\")]/" Properties/AssemblyInfo.cs

      - name: Build
        run: xbuild ImprovedPublicTransport.sln /p:Configuration=Release /nologo /verbosity:quiet

      - name: Stage dist/
        run: |
          mkdir -p dist/IPTEssentials
          cp bin/Release/ImprovedPublicTransport2.dll dist/IPTEssentials/IPTEssentials.dll
          cp -r Locale dist/IPTEssentials/Locale
          cp -r Resources dist/IPTEssentials/Resources
          echo "dist/ contents:"
          ls -lh dist/IPTEssentials/

      # Package the staged mod (DLL + Locale + Resources) so non-Steam users can install
      # manually: extract the IPTEssentials/ folder into Addons/Mods/.
      - name: Package mod zip
        id: package
        run: |
          ZIP="IPTEssentials-${{ github.ref_name }}.zip"
          (cd dist && zip -r "../${ZIP}" IPTEssentials)
          echo "zip=${ZIP}" >> "$GITHUB_OUTPUT"
          ls -lh "${ZIP}"

      # Attach the zip to the GitHub Release that Release Please already created for this tag.
      # Uses gh release upload (assets only) so the existing release notes are untouched.
      - name: Attach mod zip to GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "${{ github.ref_name }}" "${{ steps.package.outputs.zip }}" --clobber

      - name: Build change note from CHANGELOG.md
        id: note
        run: |
          MANUAL_NOTE="${{ github.event.inputs.changeNote }}"
          if [[ -n "$MANUAL_NOTE" ]]; then
            echo "value=$MANUAL_NOTE" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          TAG="${{ github.ref_name }}"
          VERSION="${TAG#v}"
          if [[ -z "$VERSION" || "$VERSION" == "$TAG" ]]; then
            VERSION=$(python3 -c "import json; print(json.load(open('.release-please-manifest.json'))['.'])")
          fi

          SECTION=$(awk \
            "/^## \[$VERSION\]/{found=1; next} \
             found && /^## \[/{exit} \
             found{print}" \
            CHANGELOG.md \
            | sed '/^[[:space:]]*$/d')

          BBCODE=$(echo "$SECTION" | python3 Workshop/md_to_bbcode.py)
          RELEASE_URL="https://github.com/${{ github.repository }}/releases/tag/v${VERSION}"

          if [[ -n "$BBCODE" ]]; then
            NOTE=$(printf '%s\n\n[url=%s]Full release notes on GitHub[/url]' "$BBCODE" "$RELEASE_URL")
          else
            NOTE="Release ${VERSION} - [url=${RELEASE_URL}]${RELEASE_URL}[/url]"
          fi

          NOTE="${NOTE:0:8000}"
          {
            echo "value<<__EOF__"
            echo "$NOTE"
            echo "__EOF__"
          } >> "$GITHUB_OUTPUT"

      - name: Install steamcmd
        run: |
          mkdir -p "$HOME/steamcmd"
          curl -sqL "https://steamcdn-a.akamaihd.net/client/installer/steamcmd_linux.tar.gz" \
            | tar -xz -C "$HOME/steamcmd"
          "$HOME/steamcmd/steamcmd.sh" +quit || true
          echo "$HOME/steamcmd" >> "$GITHUB_PATH"

      - name: Install Steam session
        env:
          STEAM_CONFIG_VDF: ${{ secrets.STEAM_CONFIG_VDF }}
        run: |
          STEAMROOT="$HOME/Steam"
          mkdir -p "$STEAMROOT/config"
          echo "$STEAM_CONFIG_VDF" | base64 -d > "$STEAMROOT/config/config.vdf"
          mkdir -p "$HOME/.steam"
          ln -sfn "$STEAMROOT" "$HOME/.steam/steam"
          ln -sfn "$STEAMROOT" "$HOME/.steam/root"

      - name: Deploy to Steam Workshop
        env:
          STEAM_USERNAME: ${{ secrets.STEAM_USERNAME }}
          WORKSHOP_ITEM_ID: ${{ secrets.WORKSHOP_ITEM_ID }}
          CHANGE_NOTE: ${{ steps.note.outputs.value }}
        run: |
          python3 Workshop/generate_vdf.py
          steamcmd.sh \
            +login "$STEAM_USERNAME" \
            +workshop_build_item /tmp/item.vdf \
            +quit
